<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🍺 BEER IMPERIUM · пивная империя</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
            user-select: none;
        }
        body {
            background: #0a0806;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px;
        }
        .container {
            max-width: 440px;
            width: 100%;
            background: linear-gradient(145deg, #1a140e, #0d0a07);
            border-radius: 40px;
            padding: 16px 14px 20px;
            border: 2px solid #f5a623;
            box-shadow: 0 0 60px #f5a62333, inset 0 0 30px #1a140e;
            position: relative;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 10px;
            border-bottom: 2px solid #2a1f12;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            background: #14100a;
            padding: 4px 14px 4px 6px;
            border-radius: 40px;
            border: 1px solid #3a2a1a;
            transition: 0.2s;
        }
        .user-info:hover {
            border-color: #f5a623;
        }
        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #2a1f12;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            border: 2px solid #f5a623;
        }
        .user-details {
            line-height: 1.2;
        }
        .user-name {
            font-weight: 700;
            font-size: 15px;
            color: #f0e6d3;
        }
        .user-level {
            font-size: 11px;
            color: #f5a623;
            font-weight: 600;
        }
        .online-badge {
            background: #2d8a4e;
            padding: 2px 10px;
            border-radius: 30px;
            font-size: 10px;
            font-weight: 700;
            color: #d4ffd4;
            letter-spacing: 0.3px;
        }
        .coins {
            background: #14100a;
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: 800;
            font-size: 20px;
            color: #f5a623;
            border: 1px solid #4d3a1a;
            box-shadow: 0 0 16px #f5a62322;
        }
        .coins small {
            font-size: 12px;
            color: #a57a3a;
        }

        .clicker-area {
            margin: 16px 0 12px;
            background: #14100a;
            border-radius: 80px;
            padding: 16px 0;
            text-align: center;
            border: 3px solid #2a1f12;
            cursor: pointer;
            transition: 0.08s linear;
            box-shadow: inset 0 -6px 0 #0a0806, 0 0 40px #f5a62311;
            position: relative;
        }
        .clicker-area:active {
            transform: scale(0.95);
            border-color: #f5a623;
            box-shadow: 0 0 60px #f5a62344;
        }
        .beer-icon {
            font-size: 72px;
            filter: drop-shadow(0 4px 12px #f5a62344);
            transition: 0.1s;
        }
        .clicker-area .click-hint {
            color: #6a5a4a;
            font-size: 13px;
            font-weight: 600;
            margin-top: 2px;
            letter-spacing: 2px;
        }
        .clicker-area .power-badge {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: #14100a;
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 700;
            color: #f5a623;
            border: 1px solid #4d3a1a;
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            background: #0d0a07;
            padding: 8px 14px;
            border-radius: 60px;
            margin: 10px 0 14px;
            border: 1px solid #1a140e;
        }
        .stat {
            text-align: center;
        }
        .stat .val {
            font-weight: 800;
            font-size: 16px;
            color: #f0e6d3;
        }
        .stat .lbl {
            font-size: 9px;
            text-transform: uppercase;
            color: #5a4a3a;
            letter-spacing: 0.3px;
        }

        .tabs {
            display: flex;
            gap: 4px;
            margin: 12px 0 10px;
            flex-wrap: wrap;
        }
        .tabs button {
            flex: 1;
            background: #0d0a07;
            border: none;
            color: #5a4a3a;
            padding: 6px 0;
            border-radius: 30px;
            font-weight: 700;
            font-size: 11px;
            cursor: pointer;
            transition: 0.15s;
            border: 1px solid #1a140e;
            min-width: 60px;
        }
        .tabs button.active {
            background: #2a1f12;
            color: #f5a623;
            border-color: #f5a623;
            box-shadow: 0 0 20px #f5a62322;
        }

        .tab-content {
            display: none;
            background: #0d0a07;
            border-radius: 20px;
            padding: 4px 0;
            max-height: 320px;
            overflow-y: auto;
            border: 1px solid #1a140e;
        }
        .tab-content.active {
            display: block;
        }
        .tab-content::-webkit-scrollbar {
            width: 4px;
        }
        .tab-content::-webkit-scrollbar-thumb {
            background: #f5a623;
            border-radius: 10px;
        }

        .shop-item, .factory-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #14100a;
            margin: 4px 6px;
            padding: 8px 12px;
            border-radius: 30px;
            border-left: 4px solid #3a2a1a;
            transition: 0.1s;
        }
        .shop-item .info, .factory-item .info {
            display: flex;
            flex-direction: column;
        }
        .shop-item .name, .factory-item .name {
            font-weight: 700;
            font-size: 14px;
            color: #f0e6d3;
        }
        .shop-item .desc, .factory-item .desc {
            font-size: 10px;
            color: #6a5a4a;
        }
        .shop-item .price, .factory-item .price {
            background: #1a140e;
            padding: 4px 14px;
            border-radius: 30px;
            font-weight: 800;
            font-size: 13px;
            color: #f5a623;
            border: 1px solid #4d3a1a;
            cursor: pointer;
            transition: 0.1s;
        }
        .shop-item .price:active, .factory-item .price:active {
            transform: scale(0.92);
            background: #2a1f12;
        }
        .shop-item .price.disabled, .factory-item .price.disabled {
            opacity: 0.4;
            pointer-events: none;
        }
        .factory-item {
            border-left-color: #f5a623;
        }

        .leader-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #14100a;
            margin: 4px 6px;
            padding: 8px 12px;
            border-radius: 30px;
            border-left: 4px solid #3a4a6a;
        }
        .leader-item .pos {
            font-weight: 800;
            color: #5a6a8a;
            width: 28px;
            font-size: 13px;
        }
        .leader-item .lname {
            font-weight: 600;
            flex: 1;
            margin-left: 6px;
            color: #f0e6d3;
            font-size: 14px;
        }
        .leader-item .lscore {
            font-weight: 700;
            color: #f5a623;
            font-size: 13px;
        }

        .footer {
            margin-top: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: #3a2a1a;
            border-top: 1px solid #1a140e;
            padding-top: 10px;
            flex-wrap: wrap;
            gap: 6px;
        }
        .footer button {
            background: none;
            border: none;
            color: #6a5a4a;
            font-weight: 600;
            cursor: pointer;
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 20px;
            transition: 0.2s;
        }
        .footer button:hover {
            color: #f5a623;
            background: #1a140e;
        }
        .online-count {
            color: #4a8a5a;
            font-weight: 700;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: #1a140e;
            padding: 24px;
            border-radius: 32px;
            max-width: 400px;
            width: 92%;
            border: 2px solid #f5a623;
            box-shadow: 0 0 60px #f5a62333;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-content h2 {
            color: #f5a623;
            margin-bottom: 16px;
            text-align: center;
        }
        .modal-content input, .modal-content select {
            width: 100%;
            padding: 10px 14px;
            margin: 6px 0;
            border-radius: 30px;
            border: 1px solid #2a1f12;
            background: #0d0a07;
            color: #f0e6d3;
            font-size: 14px;
        }
        .modal-content button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 30px;
            border: none;
            background: #f5a623;
            color: #0a0806;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }
        .modal-content button:active {
            transform: scale(0.95);
        }
        .modal-close {
            float: right;
            background: none;
            border: none;
            color: #5a4a3a;
            font-size: 24px;
            cursor: pointer;
        }
        .avatar-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin: 10px 0;
        }
        .avatar-option {
            text-align: center;
            padding: 8px;
            border-radius: 16px;
            background: #0d0a07;
            border: 2px solid transparent;
            cursor: pointer;
            font-size: 32px;
            transition: 0.2s;
        }
        .avatar-option:hover {
            border-color: #3a2a1a;
        }
        .avatar-option.selected {
            border-color: #f5a623;
            background: #1a140e;
        }
        .avatar-option small {
            display: block;
            font-size: 9px;
            color: #5a4a3a;
            margin-top: 2px;
        }
        .command-hint {
            color: #5a4a3a;
            font-size: 11px;
            text-align: center;
            margin-top: 8px;
            padding: 8px;
            background: #0d0a07;
            border-radius: 20px;
            border: 1px solid #1a140e;
        }
        .command-hint code {
            color: #f5a623;
            background: #1a140e;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
        }
        .offline-earn {
            background: #1a140e;
            padding: 8px 12px;
            border-radius: 20px;
            margin: 6px 0;
            text-align: center;
            border: 1px solid #2a1f12;
            color: #8a7a6a;
            font-size: 12px;
        }
        .offline-earn strong {
            color: #f5a623;
        }
        .total-power {
            color: #f5a623;
            font-weight: 700;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Шапка -->
    <div class="header">
        <div class="user-info" id="openProfile">
            <div class="avatar" id="avatarDisplay">🍺</div>
            <div class="user-details">
                <div class="user-name" id="userName">Гость</div>
                <div class="user-level">⭐ LVL <span id="userLevel">1</span></div>
            </div>
            <span class="online-badge" id="onlineBadge">● LIVE</span>
        </div>
        <div class="coins">🍺 <span id="coinDisplay">0</span><small> BEER</small></div>
    </div>

    <!-- Кликер -->
    <div class="clicker-area" id="clicker">
        <div class="beer-icon">🍺</div>
        <div class="click-hint">▼ ТАПНИ ПИВО ▼</div>
        <div class="power-badge">⚡<span id="powerDisplay">1</span></div>
    </div>

    <!-- Оффлайн фарм -->
    <div class="offline-earn" id="offlineDisplay">⏳ Оффлайн-фарм: <strong id="offlineEarn">0</strong> 🍺</div>

    <!-- Статы -->
    <div class="stats-row">
        <div class="stat"><div class="val" id="totalClicks">0</div><div class="lbl">глотков</div></div>
        <div class="stat"><div class="val" id="buffDisplay">0</div><div class="lbl">бафы</div></div>
        <div class="stat"><div class="val" id="factoryCount">0</div><div class="lbl">заводов</div></div>
    </div>

    <!-- Вкладки -->
    <div class="tabs">
        <button class="active" data-tab="shop">🏪 Магазин</button>
        <button data-tab="factory">🏭 Заводы</button>
        <button data-tab="buffs">⚡ Бафы</button>
        <button data-tab="top">🏆 Топ</button>
        <button data-tab="profile">👤 Профиль</button>
    </div>

    <div id="tab-shop" class="tab-content active"></div>
    <div id="tab-factory" class="tab-content"></div>
    <div id="tab-buffs" class="tab-content"></div>
    <div id="tab-top" class="tab-content"></div>
    <div id="tab-profile" class="tab-content"></div>

    <!-- Футер -->
    <div class="footer">
        <span>👥 <span class="online-count" id="onlineCount">0</span> пьют с нами</span>
        <div>
            <button id="saveBtn">💾 Сохранить</button>
            <button id="registerBtn">📝 Регистрация</button>
            <button id="loginBtn">🔑 Вход</button>
        </div>
    </div>
    <div class="command-hint">
        📋 Команды: <code>/top</code> <code>/list</code> <code>/profile</code> <code>/donate</code> <code>/help</code>
    </div>
</div>

<!-- Модальное окно профиля -->
<div class="modal" id="profileModal">
    <div class="modal-content">
        <button class="modal-close" id="closeModal">✕</button>
        <h2>🍺 ПИВНОЙ ПРОФИЛЬ</h2>
        <div style="text-align:center;font-size:64px;margin:10px 0;" id="modalAvatar">🍺</div>
        <input type="text" id="nickInput" placeholder="Новый ник (макс 20 символов)" maxlength="20">
        <div class="avatar-grid" id="avatarGrid">
            <div class="avatar-option" data-avatar="🍺"><div>🍺</div><small>Пиво</small></div>
            <div class="avatar-option" data-avatar="🍻"><div>🍻</div><small>Кружки</small></div>
            <div class="avatar-option" data-avatar="🧃"><div>🧃</div><small>Квас</small></div>
            <div class="avatar-option" data-avatar="🥤"><div>🥤</div><small>Лимонад</small></div>
            <div class="avatar-option" data-avatar="🧉"><div>🧉</div><small>Матэ</small></div>
            <div class="avatar-option" data-avatar="🍷"><div>🍷</div><small>Вино</small></div>
            <div class="avatar-option" data-avatar="🥃"><div>🥃</div><small>Виски</small></div>
            <div class="avatar-option" data-avatar="🍹"><div>🍹</div><small>Коктейль</small></div>
        </div>
        <button id="saveProfileBtn">💾 Сохранить профиль</button>
        <button id="logoutBtn" style="background:#4a2a1a;color:#f0e6d3;">🚪 Выйти</button>
    </div>
</div>

<!-- Модальное окно регистрации/входа -->
<div class="modal" id="authModal">
    <div class="modal-content">
        <button class="modal-close" id="closeAuthModal">✕</button>
        <h2 id="authTitle">🔑 Вход</h2>
        <input type="text" id="authLogin" placeholder="Логин" maxlength="20">
        <input type="password" id="authPassword" placeholder="Пароль" maxlength="30">
        <button id="authSubmitBtn">Войти</button>
        <button id="authSwitchBtn" style="background:#2a1f12;color:#f5a623;">📝 Регистрация</button>
    </div>
</div>

<script>
    (function(){
        // ---------- СОСТОЯНИЕ ----------
        const state = {
            userId: '',
            username: 'Гость',
            password: '',
            avatar: '🍺',
            coins: 0,
            clickPower: 1,
            totalClicks: 0,
            level: 1,
            exp: 0,
            expToNext: 100,
            activeBuffs: [],
            buffMultiplier: 1,
            buffActive: false,
            buffTimer: null,
            // МНОГО ЗАВОДОВ
            factories: {},
            factoryCount: 0,
            totalFactoryPower: 0,
            // Оффлайн фарм
            lastOnlineTime: Date.now(),
            offlineEarn: 0,
            // Онлайн
            onlineUsers: 0,
            // База данных
            usersDB: {},
            leaderboard: [],
            isAuthenticated: false,
            lastSave: Date.now(),
            // Магазин с кучей предметов
            shopItems: [],
        };

        // ---------- ГЕНЕРАЦИЯ ЗАВОДОВ ----------
        function generateFactories() {
            const factoryData = [];
            const names = [
                '🏭 Пивоварня', '🏭 Крафтовая', '🏭 Мини-завод', '🏭 Средний завод',
                '🏭 Крупный завод', '🏭 Гигантский завод', '🏭 Мега-завод', '🏭 Ультра-завод',
                '🏭 Титановый завод', '🏭 Имперский завод', '🏭 Легендарный завод', '🏭 Мифический завод',
                '🏭 Космический завод', '🏭 Вселенский завод', '🏭 Бесконечный завод', '🏭 Абсолютный завод'
            ];
            const baseCosts = [100000, 300000, 700000, 1200000, 2000000, 6000000, 18000000, 54000000,
                              162000000, 486000000, 1458000000, 4374000000, 13122000000, 39366000000,
                              118098000000, 354294000000];
            const powers = [1, 2, 4, 8, 15, 30, 60, 120, 250, 500, 1000, 2000, 4000, 8000, 16000, 32000];
            
            for (let i = 0; i < 30; i++) {
                const idx = Math.min(i, names.length - 1);
                const cost = baseCosts[idx] * Math.pow(1.8, i - idx);
                factoryData.push({
                    id: 'factory_' + i,
                    name: names[idx] + ' ур.' + (i + 1),
                    desc: `Производит ${powers[idx] * Math.pow(1.2, i)} 🍺/сек`,
                    cost: Math.floor(cost),
                    power: Math.floor(powers[idx] * Math.pow(1.2, i)),
                    owned: 0,
                    index: i,
                });
            }
            return factoryData;
        }

        // ---------- ГЕНЕРАЦИЯ МАГАЗИНА (100+ предметов) ----------
        function generateShopItems() {
            const items = [];
            // Постоянные улучшения
            const powerNames = ['🍺 Кружка', '🍻 Бочонок', '🏺 Бочка', '🍷 Эликсир', '🧃 Квас', 
                              '🥤 Лимонад', '🧉 Матэ', '🥃 Виски', '🍹 Коктейль', '🍸 Шампанское',
                              '🍶 Саке', '🍾 Шампанское', '🧊 Ледяное пиво', '🔥 Огненное пиво',
                              '⭐ Золотое пиво', '💎 Алмазное пиво', '🌌 Космическое пиво'];
            const powerValues = [1, 2, 3, 5, 7, 10, 15, 20, 30, 45, 65, 90, 120, 160, 210, 270, 340];
            const powerCosts = [50, 100, 200, 350, 500, 750, 1000, 1500, 2500, 4000, 6000, 9000, 13500, 20000, 30000, 45000, 67000];
            
            for (let i = 0; i < 17; i++) {
                items.push({
                    id: 'p' + i,
                    name: powerNames[i],
                    desc: `+${powerValues[i]} сила навсегда`,
                    cost: powerCosts[i],
                    type: 'permanent',
                    value: powerValues[i]
                });
            }

            // Баффы (все возможные комбинации)
            const buffNames = [
                '⚡ Пивной заряд', '🔥 Хмельной угар', '💥 Пивной удар', '🌟 Звёздный эль',
                '🌪️ Вихрь хмеля', '⚡ Молниеносный глоток', '🍀 Удача пивовара', '🔥 Пивной дракон',
                '⚡ Эль-молния', '🌟 Золотое пиво', '🌀 Хмельной ураган', '💀 Пивной берсерк',
                '🌋 Пивной вулкан', '🦅 Пивной орёл', '🐉 Драконье пиво', '⚡ Громовое пиво',
                '💎 Пивной алмаз', '🌌 Космическое пиво', '🔥 Пивной феникс', '⚡ Молниеносный глоток',
                '🍺 Мастер-пиво', '🏆 Легендарное пиво', '🌟 Божественное пиво', '⚡ Небесный эль',
                '🔥 Пламенный эль', '🌊 Океанское пиво', '⛰️ Горное пиво', '🌿 Травяное пиво',
                '🍯 Медовое пиво', '🌶️ Пряное пиво', '🍫 Шоколадное пиво', '🍒 Вишнёвое пиво'
            ];
            const buffMults = [2, 3, 4, 5, 6, 8, 10, 12, 15, 18, 20, 25, 30, 35, 40, 50, 60, 70, 80, 90, 100, 120, 150, 200, 250, 300, 350, 400, 450, 500, 600, 700];
            const buffDurs = [30, 28, 26, 24, 22, 20, 18, 16, 15, 14, 13, 12, 11, 10, 9, 8, 7, 6, 5, 4, 3, 2, 2, 1, 1, 1, 1, 1, 1, 1, 1, 1];
            const buffCosts = [60, 150, 300, 500, 800, 1200, 1800, 2500, 3500, 5000, 7000, 10000, 14000, 19000, 25000, 33000, 43000, 56000, 72000, 92000, 117000, 150000, 190000, 240000, 300000, 370000, 450000, 540000, 640000, 750000, 870000, 1000000];

            for (let i = 0; i < 32 && i < buffNames.length; i++) {
                items.push({
                    id: 'b' + i,
                    name: buffNames[i],
                    desc: `x${buffMults[i]} сила на ${buffDurs[i]}с`,
                    cost: buffCosts[i],
                    type: 'buff',
                    value: buffMults[i],
                    duration: buffDurs[i]
                });
            }

            // Супер-баффы
            const superBuffs = [
                { name: '✨ Божественный эль', mult: 1000, dur: 1, cost: 10000000 },
                { name: '💥 Пивной взрыв', mult: 5000, dur: 1, cost: 50000000 },
                { name: '🌟 Сверхновая', mult: 10000, dur: 1, cost: 100000000 },
                { name: '🌌 Космический взрыв', mult: 50000, dur: 1, cost: 500000000 },
                { name: '🔥 Абсолютное пиво', mult: 100000, dur: 1, cost: 1000000000 },
                { name: '⚡ Бесконечная мощь', mult: 1000000, dur: 1, cost: 10000000000 },
            ];
            for (let i = 0; i < superBuffs.length; i++) {
                items.push({
                    id: 'sb' + i,
                    name: superBuffs[i].name,
                    desc: `x${superBuffs[i].mult} сила на ${superBuffs[i].dur}с`,
                    cost: superBuffs[i].cost,
                    type: 'buff',
                    value: superBuffs[i].mult,
                    duration: superBuffs[i].dur
                });
            }

            return items;
        }

        // ---------- ИНИЦИАЛИЗАЦИЯ ----------
        function initState() {
            state.factories = {};
            const factoryData = generateFactories();
            factoryData.forEach(f => {
                state.factories[f.id] = { ...f, owned: 0 };
            });
            state.shopItems = generateShopItems();
        }

        // ---------- DOM ----------
        const coinDisplay = document.getElementById('coinDisplay');
        const powerDisplay = document.getElementById('powerDisplay');
        const totalClicksDisplay = document.getElementById('totalClicks');
        const buffDisplay = document.getElementById('buffDisplay');
        const onlineCount = document.getElementById('onlineCount');
        const userName = document.getElementById('userName');
        const userLevel = document.getElementById('userLevel');
        const avatarDisplay = document.getElementById('avatarDisplay');
        const modalAvatar = document.getElementById('modalAvatar');
        const factoryCountDisplay = document.getElementById('factoryCount');
        const offlineEarnDisplay = document.getElementById('offlineEarn');

        // ---------- БД ----------
        function initDB() {
            const saved = localStorage.getItem('beer_users_db');
            if (saved) {
                try {
                    state.usersDB = JSON.parse(saved);
                } catch(e) {}
            }
            if (Object.keys(state.usersDB).length === 0) {
                state.usersDB = {
                    'admin': { password: 'admin123', avatar: '🍺', coins: 1000000, clickPower: 100, totalClicks: 50000, level: 50, exp: 0, expToNext: 100, factories: {} },
                };
                saveDB();
            }
            const lb = localStorage.getItem('beer_leaderboard');
            if (lb) {
                try {
                    state.leaderboard = JSON.parse(lb);
                } catch(e) {}
            }
        }

        function saveDB() {
            localStorage.setItem('beer_users_db', JSON.stringify(state.usersDB));
            localStorage.setItem('beer_leaderboard', JSON.stringify(state.leaderboard));
        }

        // ---------- АВТОРИЗАЦИЯ ----------
        function registerUser(login, password) {
            if (state.usersDB[login]) {
                showToast('❌ Пользователь уже существует');
                return false;
            }
            if (login.length < 3) {
                showToast('❌ Логин минимум 3 символа');
                return false;
            }
            state.usersDB[login] = {
                password: password,
                avatar: '🍺',
                coins: 100,
                clickPower: 1,
                totalClicks: 0,
                level: 1,
                exp: 0,
                expToNext: 100,
                factories: {},
            };
            saveDB();
            showToast('✅ Регистрация успешна! Войдите.');
            return true;
        }

        function loginUser(login, password) {
            if (!state.usersDB[login]) {
                showToast('❌ Пользователь не найден');
                return false;
            }
            if (state.usersDB[login].password !== password) {
                showToast('❌ Неверный пароль');
                return false;
            }
            const data = state.usersDB[login];
            state.username = login;
            state.avatar = data.avatar || '🍺';
            state.coins = data.coins || 0;
            state.clickPower = data.clickPower || 1;
            state.totalClicks = data.totalClicks || 0;
            state.level = data.level || 1;
            state.exp = data.exp || 0;
            state.expToNext = data.expToNext || 100;
            state.isAuthenticated = true;
            state.userId = login;
            
            // Загружаем заводы
            if (data.factories) {
                Object.keys(data.factories).forEach(id => {
                    if (state.factories[id]) {
                        state.factories[id].owned = data.factories[id];
                    }
                });
            }
            updateFactoryCount();
            
            updateLeaderboard();
            saveDB();
            updateUI();
            showToast(`🍺 Добро пожаловать, ${login}!`);
            document.getElementById('authModal').classList.remove('active');
            return true;
        }

        function logoutUser() {
            if (state.isAuthenticated && state.username) {
                // Сохраняем заводы
                const factoryData = {};
                Object.keys(state.factories).forEach(id => {
                    if (state.factories[id].owned > 0) {
                        factoryData[id] = state.factories[id].owned;
                    }
                });
                state.usersDB[state.username] = {
                    password: state.usersDB[state.username]?.password || '',
                    avatar: state.avatar,
                    coins: state.coins,
                    clickPower: state.clickPower,
                    totalClicks: state.totalClicks,
                    level: state.level,
                    exp: state.exp,
                    expToNext: state.expToNext,
                    factories: factoryData,
                };
                saveDB();
            }
            state.isAuthenticated = false;
            state.username = 'Гость';
            state.userId = '';
            state.coins = 0;
            state.clickPower = 1;
            state.totalClicks = 0;
            state.level = 1;
            state.exp = 0;
            state.expToNext = 100;
            state.activeBuffs = [];
            state.buffActive = false;
            if (state.buffTimer) {
                clearInterval(state.buffTimer);
                state.buffTimer = null;
            }
            // Сбрасываем заводы
            Object.keys(state.factories).forEach(id => {
                state.factories[id].owned = 0;
            });
            updateFactoryCount();
            updateUI();
            showToast('👋 Вы вышли');
        }

        // ---------- ФУНКЦИИ ----------
        function getTotalPower() {
            let base = state.clickPower + state.totalFactoryPower;
            if (state.buffActive) {
                base = Math.floor(base * state.buffMultiplier);
            }
            return base;
        }

        function updateFactoryCount() {
            let count = 0;
            let power = 0;
            Object.keys(state.factories).forEach(id => {
                if (state.factories[id].owned > 0) {
                    count += state.factories[id].owned;
                    power += state.factories[id].power * state.factories[id].owned;
                }
            });
            state.factoryCount = count;
            state.totalFactoryPower = power;
            factoryCountDisplay.innerText = count;
        }

        function updateUI() {
            coinDisplay.innerText = formatNumber(state.coins);
            powerDisplay.innerText = getTotalPower();
            totalClicksDisplay.innerText = formatNumber(state.totalClicks);
            const activeBuffs = state.activeBuffs.filter(b => b.timeLeft > 0).length;
            buffDisplay.innerText = activeBuffs;
            userName.innerText = state.username;
            userLevel.innerText = state.level;
            avatarDisplay.innerText = state.avatar;
            modalAvatar.innerText = state.avatar;
            onlineCount.innerText = state.onlineUsers;
            if (state.offlineEarn > 0) {
                offlineEarnDisplay.textContent = formatNumber(state.offlineEarn);
            }

            while (state.exp >= state.expToNext) {
                state.exp -= state.expToNext;
                state.level += 1;
                state.expToNext = Math.floor(state.expToNext * 1.4) + 50;
                state.clickPower += 1;
                if (state.level % 5 === 0) {
                    showToast(`🎉 УРОВЕНЬ ${state.level}! +1 сила!`);
                }
            }

            renderShop();
            renderFactory();
            renderBuffs();
            renderTop();
            renderProfile();
        }

        function formatNumber(num) {
            if (num >= 1e12) return (num / 1e12).toFixed(2) + 'T';
            if (num >= 1e9) return (num / 1e9).toFixed(2) + 'B';
            if (num >= 1e6) return (num / 1e6).toFixed(2) + 'M';
            if (num >= 1e3) return (num / 1e3).toFixed(1) + 'K';
            return Math.floor(num).toString();
        }

        // ---------- КЛИК ----------
        function handleClick() {
            if (!state.isAuthenticated) {
                showToast('🔑 Войдите или зарегистрируйтесь!');
                return;
            }
            const power = getTotalPower();
            state.coins += power;
            state.totalClicks += 1;
            state.exp += power;
            updateLeaderboard();
            updateUI();
            autoSave();
        }

        // ---------- МАГАЗИН ----------
        function renderShop() {
            const container = document.getElementById('tab-shop');
            container.innerHTML = '';
            // Показываем первые 50 для производительности
            const items = state.shopItems.slice(0, 60);
            items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'shop-item';
                const canAfford = state.coins >= item.cost;
                div.innerHTML = `
                    <div class="info">
                        <div class="name">${item.name}</div>
                        <div class="desc">${item.desc}</div>
                    </div>
                    <div class="price ${canAfford ? '' : 'disabled'}" data-id="${item.id}">${formatNumber(item.cost)}🍺</div>
                `;
                container.appendChild(div);
                if (canAfford) {
                    div.querySelector('.price').addEventListener('click', () => buyShopItem(item));
                }
            });
        }

        function buyShopItem(item) {
            if (state.coins < item.cost) return;
            state.coins -= item.cost;
            if (item.type === 'permanent') {
                state.clickPower += item.value;
                showToast(`💪 Куплено! +${item.value} силы`);
            } else if (item.type === 'buff') {
                activateBuff({ name: item.name, multiplier: item.value, duration: item.duration });
            }
            updateUI();
            autoSave();
        }

        // ---------- ЗАВОДЫ ----------
        function renderFactory() {
            const container = document.getElementById('tab-factory');
            container.innerHTML = '';
            const factoryList = Object.values(state.factories);
            // Показываем все заводы, которые можно купить или уже куплены
            const available = factoryList.filter(f => f.cost <= state.coins * 10 || f.owned > 0);
            const display = available.length > 0 ? available : factoryList.slice(0, 10);
            
            display.forEach(f => {
                const div = document.createElement('div');
                div.className = 'factory-item';
                const canAfford = state.coins >= f.cost;
                const ownedText = f.owned > 0 ? ` (${f.owned} шт.)` : '';
                div.innerHTML = `
                    <div class="info">
                        <div class="name">${f.name}${ownedText}</div>
                        <div class="desc">${f.desc} · стоимость: ${formatNumber(f.cost)} 🍺</div>
                    </div>
                    <div class="price ${canAfford ? '' : 'disabled'}">${formatNumber(f.cost)}🍺</div>
                `;
                container.appendChild(div);
                if (canAfford) {
                    div.querySelector('.price').addEventListener('click', () => buyFactory(f.id));
                }
            });
        }

        function buyFactory(id) {
            const factory = state.factories[id];
            if (!factory) return;
            if (state.coins < factory.cost) return;
            state.coins -= factory.cost;
            factory.owned += 1;
            // Увеличиваем цену
            factory.cost = Math.floor(factory.cost * 1.15);
            updateFactoryCount();
            updateUI();
            autoSave();
            showToast(`🏭 Куплен ${factory.name}!`);
        }

        // ---------- БАФЫ ----------
        function activateBuff(buffData) {
            const existing = state.activeBuffs.find(b => b.name === buffData.name);
            if (existing) {
                existing.timeLeft = buffData.duration;
                showToast(`🔄 Баф ${buffData.name} обновлён!`);
            } else {
                state.activeBuffs.push({
                    name: buffData.name,
                    multiplier: buffData.multiplier,
                    duration: buffData.duration,
                    timeLeft: buffData.duration,
                });
                showToast(`⚡ Активирован ${buffData.name}! x${buffData.multiplier}`);
            }
            state.buffActive = true;
            state.buffMultiplier = buffData.multiplier;

            if (state.buffTimer) clearInterval(state.buffTimer);
            state.buffTimer = setInterval(() => {
                let any = false;
                for (let i = state.activeBuffs.length - 1; i >= 0; i--) {
                    const b = state.activeBuffs[i];
                    b.timeLeft -= 1;
                    if (b.timeLeft <= 0) {
                        state.activeBuffs.splice(i, 1);
                    } else {
                        any = true;
                    }
                }
                if (!any) {
                    clearInterval(state.buffTimer);
                    state.buffTimer = null;
                    state.buffActive = false;
                    state.buffMultiplier = 1;
                    showToast('⏳ Бафы закончились');
                }
                updateUI();
                autoSave();
            }, 1000);
            updateUI();
            autoSave();
        }

        function renderBuffs() {
            const container = document.getElementById('tab-buffs');
            container.innerHTML = '';
            if (state.activeBuffs.length === 0) {
                container.innerHTML = '<div style="padding:20px;text-align:center;color:#5a4a3a;">Нет активных бафов<br>купи в магазине 🍺</div>';
                return;
            }
            state.activeBuffs.forEach(b => {
                const div = document.createElement('div');
                div.className = 'shop-item';
                div.style.borderLeftColor = '#f5a623';
                div.innerHTML = `
                    <div class="info">
                        <div class="name">${b.name}</div>
                        <div class="desc">x${b.multiplier} · осталось ${b.timeLeft}с</div>
                    </div>
                    <div class="price" style="background:#2a1f12;border-color:#f5a623;">⚡</div>
                `;
                container.appendChild(div);
            });
        }

        // ---------- ТОП ----------
        function renderTop() {
            const container = document.getElementById('tab-top');
            container.innerHTML = '';
            updateLeaderboard();
            const sorted = [...state.leaderboard].sort((a, b) => b.score - a.score);
            const top = sorted.slice(0, 50);
            if (top.length === 0) {
                container.innerHTML = '<div style="padding:20px;text-align:center;color:#5a4a3a;">Пока нет игроков<br>будь первым! 🍺</div>';
                return;
            }
            top.forEach((l, i) => {
                const div = document.createElement('div');
                div.className = 'leader-item';
                const isMe = l.id === state.username;
                div.style.borderLeftColor = isMe ? '#f5a623' : '#3a4a6a';
                div.innerHTML = `
                    <span class="pos">#${i+1}</span>
                    <span class="lname">${l.avatar || '🍺'} ${l.name} ${isMe ? '⭐' : ''}</span>
                    <span class="lscore">${formatNumber(l.score)} 🍺</span>
                `;
                container.appendChild(div);
            });
        }

        // ---------- ПРОФИЛЬ ----------
        function renderProfile() {
            const container = document.getElementById('tab-profile');
            container.innerHTML = `
                <div style="padding:16px;text-align:center;">
                    <div style="font-size:64px;">${state.avatar}</div>
                    <h3 style="color:#f0e6d3;">${state.username}</h3>
                    <p style="color:#5a4a3a;font-size:12px;">ID: ${state.userId || 'Гость'}</p>
                    <div style="margin:12px 0;background:#14100a;padding:12px;border-radius:20px;">
                        <p style="color:#f5a623;">⭐ Уровень ${state.level}</p>
                        <p style="color:#6a5a4a;font-size:12px;">Опыт: ${formatNumber(state.exp)}/${formatNumber(state.expToNext)}</p>
                        <p style="color:#f5a623;">🍺 ${formatNumber(state.coins)} монет</p>
                        <p style="color:#6a5a4a;font-size:12px;">⚡ Сила: ${formatNumber(getTotalPower())}</p>
                        <p style="color:#6a5a4a;font-size:12px;">🏭 Заводов: ${state.factoryCount} (${formatNumber(state.totalFactoryPower)}/сек)</p>
                        <p style="color:#6a5a4a;font-size:12px;">👥 Всего кликов: ${formatNumber(state.totalClicks)}</p>
                    </div>
                </div>
            `;
        }

        // ---------- ЛИДЕРБОРД ----------
        function updateLeaderboard() {
            const users = Object.keys(state.usersDB);
            state.leaderboard = users.map(login => ({
                id: login,
                name: login,
                avatar: state.usersDB[login].avatar || '🍺',
                score: state.usersDB[login].totalClicks || 0,
                level: state.usersDB[login].level || 1,
            }));
            state.leaderboard.sort((a, b) => b.score - a.score);
            saveDB();
        }

        // ---------- ОНЛАЙН ----------
        function updateOnline() {
            const base = 200 + Math.floor(Math.random() * 100);
            const botNames = ['Пивной_гуру', 'Хмельной_рыцарь', 'Пивовар', 'Кружка_пива', 
                            'Бочонок_счастья', 'Пивной_маг', 'Эль_король', 'Стаут_воин', 
                            'Портер_герой', 'Лагер_мастер', 'Пивной_барон', 'Хмельной_принц',
                            'Пивной_король', 'Бочка_радости', 'Кег_мастер', 'Пивной_дракон'];
            const avatars = ['🍺', '🍻', '🧃', '🥤', '🍷', '🥃', '🍹', '🍸', '🧊', '🔥', '⭐', '💎'];
            
            for (let i = 0; i < 8; i++) {
                const randomId = 'bot_' + Math.random().toString(36).substr(2, 6);
                if (!state.leaderboard.find(l => l.id === randomId)) {
                    state.leaderboard.push({
                        id: randomId,
                        name: botNames[Math.floor(Math.random() * botNames.length)] + '_' + Math.floor(Math.random() * 999),
                        avatar: avatars[Math.floor(Math.random() * avatars.length)],
                        score: Math.floor(Math.random() * 100000) + 50,
                        level: Math.floor(Math.random() * 30) + 1,
                    });
                }
            }
            
            state.onlineUsers = base + Math.floor(Math.random() * 80);
            onlineCount.innerText = state.onlineUsers;
            updateLeaderboard();
            saveDB();
        }

        // ---------- ОФФЛАЙН ----------
        function calculateOfflineEarn() {
            const now = Date.now();
            const diff = (now - state.lastOnlineTime) / 1000;
            if (diff > 10) {
                const basePower = state.clickPower + state.totalFactoryPower;
                const earn = Math.floor(diff * basePower * 0.5);
                if (earn > 0) {
                    state.coins += earn;
                    state.offlineEarn = earn;
                    offlineEarnDisplay.textContent = formatNumber(earn);
                    showToast(`⏳ Оффлайн-фарм: +${formatNumber(earn)} 🍺`);
                }
            }
            state.lastOnlineTime = now;
        }

        // ---------- КОМАНДЫ ----------
        function processCommand(text) {
            const cmd = text.trim().toLowerCase();
            if (cmd === '/top' || cmd === '/list') {
                document.querySelector('[data-tab="top"]').click();
            } else if (cmd === '/profile') {
                document.querySelector('[data-tab="profile"]').click();
            } else if (cmd === '/donate') {
                showToast('💖 Поддержать проект: BTC: 1A1zP1eP5QGefi2DMPTfTL5SLmv7DivfNa');
            } else if (cmd === '/help') {
                showToast('📋 Команды: /top, /list, /profile, /donate, /help');
            } else if (cmd.startsWith('/')) {
                showToast('❌ Неизвестная команда. /help - список команд');
            }
        }

        // ---------- СОХРАНЕНИЕ ----------
        function autoSave() {
            const now = Date.now();
            if (now - state.lastSave > 3000) {
                saveGame();
                state.lastSave = now;
            }
        }

        function saveGame() {
            if (state.isAuthenticated && state.username) {
                const factoryData = {};
                Object.keys(state.factories).forEach(id => {
                    if (state.factories[id].owned > 0) {
                        factoryData[id] = state.factories[id].owned;
                    }
                });
                state.usersDB[state.username] = {
                    password: state.usersDB[state.username]?.password || '',
                    avatar: state.avatar,
                    coins: state.coins,
                    clickPower: state.clickPower,
                    totalClicks: state.totalClicks,
                    level: state.level,
                    exp: state.exp,
                    expToNext: state.expToNext,
                    factories: factoryData,
                };
                saveDB();
            }
            localStorage.setItem('beer_last_online', String(Date.now()));
        }

        // ---------- МОДАЛКИ ----------
        function openProfile() {
            document.getElementById('profileModal').classList.add('active');
            document.getElementById('nickInput').value = state.username;
            document.querySelectorAll('.avatar-option').forEach(el => {
                el.classList.toggle('selected', el.dataset.avatar === state.avatar);
            });
        }

        function saveProfile() {
            if (!state.isAuthenticated) {
                showToast('🔑 Сначала войдите в аккаунт!');
                return;
            }
            const newNick = document.getElementById('nickInput').value.trim() || state.username;
            const newAvatar = document.querySelector('.avatar-option.selected')?.dataset.avatar || '🍺';
            
            if (newNick !== state.username && state.usersDB[newNick] && newNick !== state.username) {
                showToast('❌ Этот ник уже занят');
                return;
            }
            
            if (newNick !== state.username) {
                const oldName = state.username;
                state.usersDB[newNick] = { ...state.usersDB[oldName] };
                delete state.usersDB[oldName];
                state.username = newNick;
                state.userId = newNick;
                const lbItem = state.leaderboard.find(l => l.id === oldName);
                if (lbItem) {
                    lbItem.id = newNick;
                    lbItem.name = newNick;
                }
            }
            
            state.avatar = newAvatar;
            if (state.usersDB[state.username]) {
                state.usersDB[state.username].avatar = newAvatar;
            }
            
            saveDB();
            document.getElementById('profileModal').classList.remove('active');
            updateUI();
            showToast('✅ Профиль обновлён!');
        }

        // ---------- ТОСТ ----------
        function showToast(msg) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
                background: #1a140e; color: #f5a623; padding: 12px 24px;
                border-radius: 40px; border: 2px solid #f5a623;
                font-weight: 700; font-size: 14px; z-index: 999;
                box-shadow: 0 0 40px #f5a62333; animation: fadeInUp 0.3s ease;
                max-width: 90%; text-align: center;
            `;
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.5s';
                setTimeout(() => toast.remove(), 500);
            }, 2500);
        }

        // ---------- ИНИЦИАЛИЗАЦИЯ ----------
        function init() {
            initState();
            initDB();
            
            const lastUser = localStorage.getItem('beer_last_user');
            if (lastUser && state.usersDB[lastUser]) {
                loginUser(lastUser, state.usersDB[lastUser].password);
            }
            
            const lastOnline = localStorage.getItem('beer_last_online');
            if (lastOnline) {
                state.lastOnlineTime = parseInt(lastOnline);
                calculateOfflineEarn();
            }
            state.lastOnlineTime = Date.now();
            
            document.querySelectorAll('.avatar-option').forEach(el => {
                el.addEventListener('click', function() {
                    document.querySelectorAll('.avatar-option').forEach(a => a.classList.remove('selected'));
                    this.classList.add('selected');
                });
            });

            document.getElementById('clicker').addEventListener('click', handleClick);
            document.getElementById('openProfile').addEventListener('click', openProfile);
            document.getElementById('closeModal').addEventListener('click', () => {
                document.getElementById('profileModal').classList.remove('active');
            });
            document.getElementById('saveProfileBtn').addEventListener('click', saveProfile);
            document.getElementById('logoutBtn').addEventListener('click', () => {
                document.getElementById('profileModal').classList.remove('active');
                logoutUser();
            });
            document.getElementById('saveBtn').addEventListener('click', () => { saveGame(); showToast('💾 Сохранено!'); });
            
            document.getElementById('registerBtn').addEventListener('click', () => {
                document.getElementById('authTitle').textContent = '📝 Регистрация';
                document.getElementById('authSubmitBtn').textContent = 'Зарегистрироваться';
                document.getElementById('authSwitchBtn').textContent = '🔑 Уже есть аккаунт? Войти';
                document.getElementById('authModal').classList.add('active');
            });
            document.getElementById('loginBtn').addEventListener('click', () => {
                document.getElementById('authTitle').textContent = '🔑 Вход';
                document.getElementById('authSubmitBtn').textContent = 'Войти';
                document.getElementById('authSwitchBtn').textContent = '📝 Нет аккаунта? Регистрация';
                document.getElementById('authModal').classList.add('active');
            });
            document.getElementById('closeAuthModal').addEventListener('click', () => {
                document.getElementById('authModal').classList.remove('active');
            });
            
            document.getElementById('authSubmitBtn').addEventListener('click', () => {
                const login = document.getElementById('authLogin').value.trim();
                const password = document.getElementById('authPassword').value.trim();
                const title = document.getElementById('authTitle').textContent;
                if (title.includes('Регистрация')) {
                    if (registerUser(login, password)) {
                        document.getElementById('authLogin').value = '';
                        document.getElementById('authPassword').value = '';
                        document.getElementById('authTitle').textContent = '🔑 Вход';
                        document.getElementById('authSubmitBtn').textContent = 'Войти';
                        document.getElementById('authSwitchBtn').textContent = '📝 Нет аккаунта? Регистрация';
                    }
                } else {
                    loginUser(login, password);
                }
            });
            
            document.getElementById('authSwitchBtn').addEventListener('click', () => {
                const title = document.getElementById('authTitle');
                const btn = document.getElementById('authSubmitBtn');
                const switchBtn = document.getElementById('authSwitchBtn');
                if (title.textContent.includes('Вход')) {
                    title.textContent = '📝 Регистрация';
                    btn.textContent = 'Зарегистрироваться';
                    switchBtn.textContent = '🔑 Уже есть аккаунт? Войти';
                } else {
                    title.textContent = '🔑 Вход';
                    btn.textContent = 'Войти';
                    switchBtn.textContent = '📝 Нет аккаунта? Регистрация';
                }
            });

            document.querySelectorAll('.tabs button').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    const tab = this.dataset.tab;
                    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
                    document.getElementById('tab-' + tab).classList.add('active');
                });
            });

            window.cmd = processCommand;
            document.addEventListener('keydown', (e) => {
                if (e.key === '/' && !e.ctrlKey && !e.metaKey) {
                    const cmd = prompt('Введите команду:');
                    if (cmd) processCommand(cmd);
                }
            });

            updateOnline();
            setInterval(updateOnline, 10000);
            setInterval(() => autoSave(), 5000);
            state.lastSave = Date.now();

            // Авто-фарм заводов
            setInterval(() => {
                if (state.isAuthenticated && state.totalFactoryPower > 0) {
                    const earn = state.totalFactoryPower;
                    state.coins += earn;
                    updateUI();
                }
            }, 1000);

            updateUI();
            showToast('🍺 Добро пожаловать в ПИВНУЮ ИМПЕРИЮ!');
        }

        init();
    })();
</script>
</body>
</html>
